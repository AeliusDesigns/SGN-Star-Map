<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SGN — Star Map</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&family=Exo+2:wght@200;300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --void:       #050810;
      --deep:       #080d18;
      --surface:    #0c1220;
      --surface2:   #111b2e;
      --border:     #1a2d46;
      --border2:    #243d5e;
      --cyan:       #38e8ff;
      --cyan-dim:   #1a7090;
      --gold:       #f5c542;
      --gold-dim:   #7a6020;
      --red-alert:  #ff3b3b;
      --text:       #c8deff;
      --text-dim:   #5a7a99;
      --text-muted: #2e4a66;
      --glow-cyan:  rgba(56,232,255,.18);
      --glow-gold:  rgba(245,197,66,.18);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--void);
      color: var(--text);
      font-family: 'Exo 2', sans-serif;
      overflow: hidden;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    /* Scanline overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,0,0,.04) 3px,
        rgba(0,0,0,.04) 4px
      );
      pointer-events: none;
      z-index: 2;
    }

    /* Vignette */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(2,5,12,.85) 100%);
      pointer-events: none;
      z-index: 2;
    }

    /* HUD Top Bar */
    #hud {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 48px;
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 0;
      background: linear-gradient(180deg, rgba(5,8,16,.97) 0%, rgba(5,8,16,.7) 100%);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(10px);
      padding: 0 20px;
      pointer-events: none;
    }

    #hud::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, var(--cyan-dim) 15%, var(--cyan) 50%, var(--cyan-dim) 85%, transparent 100%);
      opacity: .4;
    }

    .hud-logo {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      font-size: 20px;
      letter-spacing: 6px;
      color: var(--cyan);
      text-transform: uppercase;
      white-space: nowrap;
      text-shadow: 0 0 16px rgba(56,232,255,.7), 0 0 32px rgba(56,232,255,.3);
      margin-right: 20px;
    }

    .hud-sep {
      width: 1px;
      height: 18px;
      background: var(--border2);
      margin: 0 14px;
      flex-shrink: 0;
      opacity: .6;
    }

    .hud-item {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      color: var(--text-dim);
      white-space: nowrap;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .hud-item b {
      color: var(--gold);
      font-weight: 400;
    }

    .hud-item.mode-active b {
      color: var(--cyan);
      text-shadow: 0 0 8px rgba(56,232,255,.7);
    }

    .hud-spacer { flex: 1; }

    .hud-hint {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      color: var(--text-muted);
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    /* Corner brackets */
    .corner-bracket {
      position: fixed;
      width: 22px; height: 22px;
      z-index: 15;
      pointer-events: none;
    }
    .corner-bracket::before, .corner-bracket::after {
      content: '';
      position: absolute;
      background: var(--cyan);
      opacity: .35;
    }
    .corner-bracket.tl { top: 56px; left: 10px; }
    .corner-bracket.tr { top: 56px; right: 10px; }
    .corner-bracket.bl { bottom: 40px; left: 10px; }
    .corner-bracket.br { bottom: 40px; right: 10px; }
    .corner-bracket.tl::before,.corner-bracket.tr::before { top:0; height:1px; width:100%; }
    .corner-bracket.tl::after,.corner-bracket.tr::after   { top:0; height:100%; width:1px; }
    .corner-bracket.bl::before,.corner-bracket.br::before { bottom:0; height:1px; width:100%; }
    .corner-bracket.bl::after,.corner-bracket.br::after   { bottom:0; height:100%; width:1px; }
    .corner-bracket.tr::after  { right:0; left:auto; }
    .corner-bracket.br::after  { right:0; left:auto; }

    /* Status bar */
    #statusBar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 30px;
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 0 16px;
      background: linear-gradient(0deg, rgba(5,8,16,.97) 0%, rgba(5,8,16,.6) 100%);
      border-top: 1px solid var(--border);
      pointer-events: none;
    }

    #statusBar::before {
      content: '';
      position: absolute;
      top: -1px; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, var(--border2) 30%, var(--border2) 70%, transparent 100%);
    }

    .sb-item {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      color: var(--text-muted);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .sb-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 5px var(--cyan);
      flex-shrink: 0;
      animation: dotpulse 2.8s ease-in-out infinite;
    }

    .sb-dot.off { background: var(--text-muted); box-shadow: none; animation: none; }
    .sb-dot.gold { background: var(--gold); box-shadow: 0 0 5px var(--gold); }

    @keyframes dotpulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .25; }
    }

    .sb-spacer { flex: 1; }

    /* Tooltip */
    #tooltip {
      position: fixed;
      pointer-events: none;
      display: none;
      z-index: 30;
      transform: translate(14px, -50%);
    }

    .tip-inner {
      background: rgba(8,13,24,.92);
      border: 1px solid var(--border2);
      border-radius: 3px;
      padding: 9px 13px;
      min-width: 150px;
      position: relative;
      box-shadow: 0 0 24px rgba(56,232,255,.1), 0 6px 24px rgba(0,0,0,.7);
      backdrop-filter: blur(6px);
    }

    .tip-inner::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 3px;
      background: linear-gradient(135deg, rgba(56,232,255,.05), transparent 60%);
    }

    .tip-corner {
      position: absolute;
      width: 7px; height: 7px;
    }
    .tip-corner.tl { top:-1px; left:-1px; border-top:1px solid var(--cyan); border-left:1px solid var(--cyan); }
    .tip-corner.tr { top:-1px; right:-1px; border-top:1px solid var(--cyan); border-right:1px solid var(--cyan); }
    .tip-corner.bl { bottom:-1px; left:-1px; border-bottom:1px solid var(--cyan); border-left:1px solid var(--cyan); }
    .tip-corner.br { bottom:-1px; right:-1px; border-bottom:1px solid var(--cyan); border-right:1px solid var(--cyan); }

    .tip-name {
      font-family: 'Rajdhani', sans-serif;
      font-size: 15px;
      font-weight: 600;
      color: var(--cyan);
      letter-spacing: 1px;
    }

    .tip-id {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      color: var(--text-muted);
      margin-top: 3px;
      letter-spacing: 1px;
    }

    .tip-owner {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 2px;
      font-style: italic;
    }

    /* ── Side Panel ── */
    #sidePanel {
      position: fixed;
      top: 0; right: 0;
      height: 100vh;
      width: 360px;
      background: rgba(5,8,16,.97);
      border-left: 1px solid var(--border);
      color: var(--text);
      transform: translateX(100%);
      transition: transform .22s cubic-bezier(.16,1,.3,1);
      display: flex;
      flex-direction: column;
      z-index: 25;
      overflow: hidden;
    }

    #sidePanel::after {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 1px; height: 100%;
      background: linear-gradient(180deg, var(--cyan) 0%, rgba(56,232,255,.2) 40%, transparent 100%);
      opacity: .6;
      pointer-events: none;
    }

    /* ── Panel Header ── */
    .panel-header {
      padding: 0 14px 0;
      border-bottom: 1px solid var(--border);
      margin-top: 48px;
      flex-shrink: 0;
    }

    .panel-identity {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 0 12px;
    }

    /* Star classification orb */
    .star-orb {
      width: 42px; height: 42px;
      border-radius: 50%;
      flex-shrink: 0;
      position: relative;
      display: flex; align-items: center; justify-content: center;
    }

    .star-orb::after {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      border: 1px solid currentColor;
      opacity: .25;
    }

    .star-orb-label {
      font-family: 'Rajdhani', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: rgba(255,255,255,.9);
      z-index: 1;
      text-shadow: 0 0 6px rgba(0,0,0,.8);
    }

    .panel-title-block { flex: 1; min-width: 0; }

    .panel-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 8px;
      color: var(--text-muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 3px;
    }

    #sp-title {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      font-size: 20px;
      color: var(--text);
      letter-spacing: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.1;
    }

    .panel-owner {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .panel-close {
      background: transparent;
      border: 1px solid var(--border2);
      color: var(--text-muted);
      width: 26px; height: 26px;
      border-radius: 2px;
      cursor: pointer;
      font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      align-self: flex-start;
      margin-top: 2px;
      transition: all .12s;
      pointer-events: all;
    }
    .panel-close:hover { border-color: var(--red-alert); color: var(--red-alert); }

    /* ── Tab Bar ── */
    .tab-bar {
      display: flex;
      border-bottom: 1px solid var(--border);
      margin: 0 -14px;
      padding: 0 14px;
    }

    .tab {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 8px 12px 7px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color .12s, border-color .12s;
      user-select: none;
      pointer-events: all;
      margin-bottom: -1px;
    }

    .tab:hover { color: var(--text-dim); }
    .tab.active { color: var(--cyan); border-bottom-color: var(--cyan); }

    /* ── Body ── */
    #sp-body {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border2) transparent;
    }

    #sp-body::-webkit-scrollbar { width: 3px; }
    #sp-body::-webkit-scrollbar-track { background: transparent; }
    #sp-body::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    .tab-pane { display: none; padding: 14px; }
    .tab-pane.active { display: block; }

    /* ── Orbit Diagram ── */
    .orbit-diagram {
      width: 100%;
      aspect-ratio: 1;
      max-height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 14px;
    }

    .orbit-diagram svg { width: 100%; height: 100%; }

    /* ── Stats Grid ── */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-bottom: 14px;
    }

    .stat-cell {
      background: rgba(12,18,32,.7);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 8px 10px;
      position: relative;
      overflow: hidden;
    }

    .stat-cell::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, var(--cyan-dim), transparent);
      opacity: .4;
    }

    .stat-key {
      font-family: 'Share Tech Mono', monospace;
      font-size: 8px;
      color: var(--text-muted);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .stat-val {
      font-family: 'Rajdhani', sans-serif;
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      line-height: 1;
    }

    .stat-val.cyan { color: var(--cyan); }
    .stat-val.gold { color: var(--gold); }

    .stat-sub {
      font-family: 'Share Tech Mono', monospace;
      font-size: 8px;
      color: var(--text-muted);
      margin-top: 1px;
    }

    /* ── Metadata rows ── */
    .meta-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
      padding: 5px 0;
      border-bottom: 1px solid rgba(26,45,70,.35);
    }
    .meta-row:last-child { border-bottom: none; }

    .mk {
      font-family: 'Share Tech Mono', monospace;
      font-size: 8px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      width: 72px;
      flex-shrink: 0;
    }

    .mv { font-size: 12px; color: var(--text); flex: 1; }
    .mv.hi { color: var(--cyan); font-family: 'Share Tech Mono', monospace; font-size: 10px; }
    .mv.go { color: var(--gold); }

    /* ── Tag chips ── */
    .tag-chip {
      display: inline-block;
      background: rgba(56,232,255,.07);
      border: 1px solid rgba(56,232,255,.2);
      border-radius: 2px;
      padding: 1px 6px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 8px;
      color: var(--cyan-dim);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin: 2px 2px 0 0;
    }

    /* ── Planet list (BODIES tab) ── */
    .bodies-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .bodies-count {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      color: var(--text-muted);
      letter-spacing: 1.5px;
    }

    .planet-card {
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 10px 12px 10px 14px;
      margin-bottom: 6px;
      background: rgba(8,13,24,.6);
      position: relative;
      overflow: hidden;
      display: flex;
      gap: 10px;
      align-items: center;
      transition: border-color .12s, background .12s;
    }

    .planet-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 3px; height: 100%;
      background: var(--border);
      transition: background .12s;
    }

    .planet-card:hover { border-color: var(--border2); background: rgba(56,232,255,.04); }
    .planet-card:hover::before { background: var(--cyan); }

    /* Type icon circle */
    .p-icon {
      width: 30px; height: 30px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
    }

    .p-info { flex: 1; min-width: 0; }

    .p-name {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 600;
      font-size: 14px;
      letter-spacing: .5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .p-type-badge {
      font-family: 'Share Tech Mono', monospace;
      font-size: 8px;
      color: var(--text-muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-top: 1px;
    }

    .p-orbit-val {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      color: var(--text-dim);
      flex-shrink: 0;
      text-align: right;
    }

    .p-notes-line {
      font-size: 10px;
      color: var(--text-muted);
      font-style: italic;
      margin-top: 2px;
    }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 32px 0;
    }

    .empty-state-icon { font-size: 28px; opacity: .3; margin-bottom: 10px; }

    .empty-state-text {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      color: var(--text-muted);
      letter-spacing: 1.5px;
      line-height: 2;
    }

    /* ── Global buttons ── */
    .pbtn {
      background: transparent;
      border: 1px solid var(--border2);
      color: var(--text-dim);
      border-radius: 2px;
      padding: 5px 10px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      cursor: pointer;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      transition: all .12s;
      pointer-events: all;
    }

    .pbtn:hover {
      border-color: var(--cyan);
      color: var(--cyan);
      background: rgba(56,232,255,.05);
      box-shadow: 0 0 8px rgba(56,232,255,.15);
    }

    .pbtn.primary { border-color: var(--cyan-dim); color: var(--cyan); }
    .pbtn.success { border-color: #1e4a28; color: #5cdb7a; }
    .pbtn.success:hover { border-color: #5cdb7a; background: rgba(92,219,122,.05); }
    .pbtn.danger { border-color: #3a2020; color: #cc6666; }
    .pbtn.danger:hover { border-color: var(--red-alert); color: var(--red-alert); background: rgba(255,59,59,.05); }

    /* ── Footer ── */
    .panel-footer {
      padding: 9px 14px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    /* ── Edit form ── */
    .edit-section {
      margin-bottom: 16px;
    }

    .edit-section-title {
      font-family: 'Share Tech Mono', monospace;
      font-size: 8px;
      color: var(--text-muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 10px;
    }

    .sci-input, .sci-select {
      background: rgba(5,8,16,.9);
      color: var(--text);
      border: 1px solid var(--border2);
      border-radius: 2px;
      padding: 6px 8px;
      font-family: 'Exo 2', sans-serif;
      font-size: 12px;
      width: 100%;
      outline: none;
      transition: border-color .12s, box-shadow .12s;
    }

    .sci-input:focus, .sci-select:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 0 2px rgba(56,232,255,.08);
    }

    .sci-select option { background: #080d18; }

    .form-row {
      display: grid;
      grid-template-columns: 76px 1fr;
      gap: 6px 10px;
      align-items: center;
      margin-bottom: 6px;
    }

    .fl {
      font-family: 'Share Tech Mono', monospace;
      font-size: 8px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Planet editor rows */
    .planet-row {
      border: 1px solid var(--border);
      border-radius: 3px;
      margin-bottom: 8px;
      overflow: hidden;
    }

    .planet-row-head {
      background: rgba(12,18,32,.8);
      border-bottom: 1px solid var(--border);
      padding: 7px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .p-idx {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      color: var(--cyan-dim);
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .planet-row-body {
      padding: 8px 10px;
    }

    .edit-actions {
      display: flex;
      gap: 6px;
      margin-top: 6px;
    }
  </style>
</head>
<body>

  <canvas id="gl"></canvas>

  <div class="corner-bracket tl"></div>
  <div class="corner-bracket tr"></div>
  <div class="corner-bracket bl"></div>
  <div class="corner-bracket br"></div>

  <!-- HUD top bar -->
  <div id="hud">
    <div class="hud-logo">SGN</div>
    <div class="hud-sep"></div>
    <div class="hud-item" style="color:var(--text-dim);letter-spacing:2px;">STELLAR GATE NETWORK</div>
    <div class="hud-sep"></div>
    <span class="hud-item" id="hud-lanes">LANES &nbsp;<b>OFF</b></span>
    <span style="color:var(--text-muted);margin:0 8px;font-family:monospace;font-size:10px;">/</span>
    <span class="hud-item" id="hud-add">ADD &nbsp;<b>OFF</b></span>
    <div class="hud-spacer"></div>
    <div class="hud-hint">DRAG · SCROLL · RMB PAN</div>
  </div>

  <!-- Status bar -->
  <div id="statusBar">
    <div class="sb-item"><div class="sb-dot" id="dot-sys"></div><span id="sb-sys">INITIALIZING</span></div>
    <div class="sb-item"><div class="sb-dot gold" id="dot-lanes"></div><span id="sb-lanes-ct">— LANES</span></div>
    <div class="sb-spacer"></div>
    <div class="sb-item"><div class="sb-dot off"></div>E=LANES · A=ADD · ENTER=INSPECT</div>
  </div>

  <!-- Tooltip -->
  <div id="tooltip">
    <div class="tip-inner">
      <div class="tip-corner tl"></div><div class="tip-corner tr"></div>
      <div class="tip-corner bl"></div><div class="tip-corner br"></div>
      <div class="tip-name" id="tip-name">—</div>
      <div class="tip-id"   id="tip-id"></div>
      <div class="tip-owner" id="tip-owner"></div>
    </div>
  </div>

  <!-- Side panel -->
  <div id="sidePanel">
    <div class="panel-header">
      <div class="panel-identity">
        <div class="star-orb" id="sp-star-orb">
          <span class="star-orb-label" id="sp-star-abbr">—</span>
        </div>
        <div class="panel-title-block">
          <div class="panel-label" id="sp-sys-id">SGN · SELECT NODE</div>
          <div id="sp-title">—</div>
          <div class="panel-owner" id="sp-owner"></div>
        </div>
        <button class="panel-close" id="sp-close">✕</button>
      </div>
      <div class="tab-bar" id="sp-tabs">
        <div class="tab active" data-tab="overview">OVERVIEW</div>
        <div class="tab" data-tab="bodies">BODIES</div>
        <div class="tab" data-tab="edit">EDIT</div>
      </div>
    </div>

    <div id="sp-body">
      <!-- OVERVIEW tab -->
      <div class="tab-pane active" id="pane-overview">
        <div class="empty-state">
          <div class="empty-state-icon">◎</div>
          <div class="empty-state-text">// NO NODE SELECTED<br>// CLICK A STAR TO INSPECT</div>
        </div>
      </div>

      <!-- BODIES tab -->
      <div class="tab-pane" id="pane-bodies">
        <div class="empty-state">
          <div class="empty-state-icon">◎</div>
          <div class="empty-state-text">// SELECT A NODE FIRST</div>
        </div>
      </div>

      <!-- EDIT tab -->
      <div class="tab-pane" id="pane-edit">
        <div class="empty-state">
          <div class="empty-state-icon">◎</div>
          <div class="empty-state-text">// SELECT A NODE FIRST</div>
        </div>
      </div>
    </div>

    <div class="panel-footer">
      <button id="sp-gen" class="pbtn primary" style="flex:1;">⟳ SCAN SYSTEM</button>
      <button id="sp-exp" class="pbtn" style="pointer-events:all;">↓ JSON</button>
    </div>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
